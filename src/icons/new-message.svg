<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Gradient bubble -->
    <linearGradient id="chatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36d1dc"/>
      <stop offset="100%" stop-color="#5b86e5"/>
    </linearGradient>

    <!-- Gradient notification -->
    <linearGradient id="notifGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff416c"/>
      <stop offset="100%" stop-color="#ff4b2b"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Chat bubble -->
  <path d="M10 12
           Q10 6 16 6
           L48 6
           Q54 6 54 12
           L54 34
           Q54 40 48 40
           L28 40
           L16 50
           L18 40
           Q10 40 10 34
           Z"
        fill="url(#chatGradient)"
        filter="url(#shadow)"/>

  <!-- Message lines -->
  <rect x="18" y="16" width="26" height="3" fill="#ffffff" opacity="0.9"/>
  <rect x="18" y="23" width="20" height="3" fill="#ffffff" opacity="0.9"/>

  <!-- Notification badge -->
  <circle cx="50" cy="14" r="8"
          fill="url(#notifGradient)"
          filter="url(#shadow)"/>

</svg>