<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Gradient hóa đơn -->
    <linearGradient id="invoiceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>

    <!-- Gradient check -->
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Invoice paper -->
  <rect x="12" y="6" width="32" height="44" rx="4"
        fill="url(#invoiceGradient)"
        filter="url(#shadow)"/>

  <!-- Invoice lines -->
  <rect x="18" y="16" width="20" height="3" fill="#ffffff" opacity="0.9"/>
  <rect x="18" y="24" width="20" height="3" fill="#ffffff" opacity="0.9"/>
  <rect x="18" y="32" width="14" height="3" fill="#ffffff" opacity="0.9"/>

  <!-- Success circle -->
  <circle cx="46" cy="46" r="12"
          fill="url(#checkGradient)"
          filter="url(#shadow)"/>

  <!-- Check mark -->
  <path d="M40 46 L45 50 L53 40"
        fill="none"
        stroke="#ffffff"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>